# Alembic配置文件
# 用于管理OceanBase数据库的Schema版本迁移

[alembic]
# 迁移脚本存放路径
script_location = alembic

# 迁移脚本模板文件
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sys.path 配置 (用于导入powermem模块)
prepend_sys_path = .

# 时区配置
timezone = UTC

# 是否截断长的Alembic版本号
truncate_slug_length = 40

# 数据库URL配置
# 注意：这个会在env.py中被环境变量覆盖
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

